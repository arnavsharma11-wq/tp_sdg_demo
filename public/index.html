<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TP.ai DataGen</title>
    <style>
      @font-face {
        font-family: 'TP Sans';
        src: url('/TPSans-Regular.ttf') format('truetype');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @keyframes orbDrift1 {
        0%   { transform: translate(0, 0) scale(1); }
        33%  { transform: translate(140px, -100px) scale(1.12); }
        66%  { transform: translate(-80px, 150px) scale(0.92); }
        100% { transform: translate(0, 0) scale(1); }
      }
      @keyframes orbDrift2 {
        0%   { transform: translate(0, 0) scale(1); }
        40%  { transform: translate(-160px, 110px) scale(1.10); }
        80%  { transform: translate(100px, -80px) scale(0.93); }
        100% { transform: translate(0, 0) scale(1); }
      }
      @keyframes orbDrift3 {
        0%   { transform: translate(0, 0) scale(1); }
        25%  { transform: translate(120px, 180px) scale(1.14); }
        75%  { transform: translate(-140px, -90px) scale(0.88); }
        100% { transform: translate(0, 0) scale(1); }
      }
      @keyframes scanDown {
        0%   { top: 24px; opacity: 0.9; }
        70%  { top: 66px; opacity: 0.3; }
        100% { top: 24px; opacity: 0.9; }
      }
      @keyframes alertPulse {
        0%,100% { opacity: 0.5; transform: scale(0.88); }
        50%     { opacity: 1;   transform: scale(1.18); }
      }
      @keyframes roadScroll {
        from { transform: translateX(0);     }
        to   { transform: translateX(-24px); }
      }
      @keyframes speedLine {
        0%,100% { opacity: 0.2; transform: scaleX(0.7); }
        50%     { opacity: 0.8; transform: scaleX(1.3); }
      }
      @keyframes headGlow {
        0%,100% { opacity: 0.4; width: 12px; }
        50%     { opacity: 1;   width: 20px; }
      }
      @keyframes chatFadeA {
        0%,40%,100% { opacity: 1;   transform: scale(1);    }
        55%,90%     { opacity: 0.15; transform: scale(0.97); }
      }
      @keyframes chatFadeB {
        0%,40%,100% { opacity: 0.15; transform: scale(0.97); }
        55%,90%     { opacity: 1;    transform: scale(1);    }
      }
      @keyframes dotBounce {
        0%,60%,100% { transform: translateY(0);   }
        30%         { transform: translateY(-6px); }
      }
      @keyframes audioBar1 {
        0%,100% { height: 3px;  }
        50%     { height: 18px; }
      }
      @keyframes audioBar2 {
        0%,100% { height: 6px;  }
        50%     { height: 22px; }
      }
      @keyframes audioBar3 {
        0%,100% { height: 4px;  }
        50%     { height: 14px; }
      }
      @keyframes audioBar4 {
        0%,100% { height: 8px;  }
        50%     { height: 20px; }
      }
      @keyframes speakerGlow {
        0%,100% { box-shadow: 0 0 6px var(--sc); opacity: 0.75; }
        50%     { box-shadow: 0 0 18px var(--sc); opacity: 1;    }
      }
      @keyframes videoShimmer {
        0%   { background-position: -200% 0; }
        100% { background-position:  200% 0; }
      }
      @keyframes personFade {
        0%,100% { opacity: 0.6; }
        50%     { opacity: 0.9; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
