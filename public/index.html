<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TP.ai DataGen</title>
    <style>
      @font-face {
        font-family: 'TP Sans';
        src: url('/TPSans-Regular.ttf') format('truetype');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @keyframes orbDrift1 {
        0%   { transform: translate(0, 0) scale(1); }
        33%  { transform: translate(90px, -70px) scale(1.08); }
        66%  { transform: translate(-50px, 110px) scale(0.95); }
        100% { transform: translate(0, 0) scale(1); }
      }
      @keyframes orbDrift2 {
        0%   { transform: translate(0, 0) scale(1); }
        40%  { transform: translate(-110px, 80px) scale(1.05); }
        80%  { transform: translate(60px, -50px) scale(0.97); }
        100% { transform: translate(0, 0) scale(1); }
      }
      @keyframes orbDrift3 {
        0%   { transform: translate(0, 0) scale(1); }
        25%  { transform: translate(70px, 130px) scale(1.06); }
        75%  { transform: translate(-90px, -60px) scale(0.94); }
        100% { transform: translate(0, 0) scale(1); }
      }
      @keyframes scanDown {
        0%   { top: 24px; opacity: 0.9; }
        70%  { top: 66px; opacity: 0.3; }
        100% { top: 24px; opacity: 0.9; }
      }
      @keyframes alertPulse {
        0%,100% { opacity: 0.5; transform: scale(0.88); }
        50%     { opacity: 1;   transform: scale(1.18); }
      }
      @keyframes radarRing {
        0%   { transform: scale(0.15); opacity: 0.9; }
        100% { transform: scale(1);    opacity: 0;   }
      }
      @keyframes chatFadeA {
        0%,40%,100% { opacity: 1;   transform: scale(1);    }
        55%,90%     { opacity: 0.15; transform: scale(0.97); }
      }
      @keyframes chatFadeB {
        0%,40%,100% { opacity: 0.15; transform: scale(0.97); }
        55%,90%     { opacity: 1;    transform: scale(1);    }
      }
      @keyframes dotBounce {
        0%,60%,100% { transform: translateY(0);   }
        30%         { transform: translateY(-6px); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
