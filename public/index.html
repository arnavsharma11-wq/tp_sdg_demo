<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TP.ai DataGen</title>
    <style>
      @font-face {
        font-family: 'TP Sans';
        src: url('/TPSans-Regular.ttf') format('truetype');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @keyframes orbDrift1 {
        0%   { transform: translate(0, 0) scale(1); }
        33%  { transform: translate(90px, -70px) scale(1.08); }
        66%  { transform: translate(-50px, 110px) scale(0.95); }
        100% { transform: translate(0, 0) scale(1); }
      }
      @keyframes orbDrift2 {
        0%   { transform: translate(0, 0) scale(1); }
        40%  { transform: translate(-110px, 80px) scale(1.05); }
        80%  { transform: translate(60px, -50px) scale(0.97); }
        100% { transform: translate(0, 0) scale(1); }
      }
      @keyframes orbDrift3 {
        0%   { transform: translate(0, 0) scale(1); }
        25%  { transform: translate(70px, 130px) scale(1.06); }
        75%  { transform: translate(-90px, -60px) scale(0.94); }
        100% { transform: translate(0, 0) scale(1); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
